<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Perfil - Abraão</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #111;
            color: white;
        }
        img {
            width: 220px;
            border-radius: 10px;
            margin-top: 10px;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background: #333;
            margin: 5px;
            padding: 10px;
            border-radius: 5px;
        }
        a {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            color: white;
            background: #000;
            padding: 10px;
            border-radius: 5px;
        }
        a:hover {
            background: #444;
        }
    </style>
</head>
<body>

    <!-- Título -->
    <h1>Abraão</h1>

    <!-- Imagem do Batman -->
    <img src="https://upload.wikimedia.org/wikipedia/en/1/17/Batman-BenAffleck.jpg" alt="Batman">

    <!-- Link funcional -->
    <p>
        <a href="https://pt.wikipedia.org/wiki/Batman" target="_blank">
            Saiba mais sobre o Batman
        </a>
    </p>

    <!-- Lista de hobbies -->
    <h2>Meus hobbies</h2>
    <ul>
        <li>Futebol</li>
        <li>Estudar</li>
        <li>Comer</li>
    </ul>

</body>
</html>
