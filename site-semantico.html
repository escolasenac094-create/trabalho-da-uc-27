<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Semântico</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }
        header, footer {
            background-color: #222;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background-color: #444;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            padding: 20px;
        }
        section {
            background-color: #f4f4f4;
            padding: 15px;
            margin-top: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <!-- Cabeçalho -->
    <header>
        <h1>Batima</h1>
    </header>

    <!-- Navegação -->
    <nav>
        <a href="#">Coringa</a>
        <a href="#">Atirador de Elite</a>
    </nav>

    <!-- Conteúdo principal -->
    <main>
        <h2>Bem-vindo!</h2>
        <p>Este é um exemplo de site usando HTML semântico.</p>

        <!-- Seção -->
        <section>
            <h3>Sobre</h3>
            <p>Este site foi criado para uma atividade utilizando tags semânticas do HTML5.</p>
        </section>
    </main>

    <!-- Rodapé -->
    <footer>
        <p>© 2026 - Abraão</p>
    </footer>

</body>
</html>
